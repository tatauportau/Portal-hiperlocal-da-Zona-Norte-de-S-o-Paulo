name: Portau Diario

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: principal
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install node-fetch
      - run: node scripts/gerar-portau.js
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      - run: |
          git config user.name "Portau Bot"
          git config user.email "carlostatau@gmail.com"
          git add index.html
          git commit -m "Portau - atualizacao automatica $(date '+%d/%m/%Y')"
          git push origin principal
